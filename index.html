<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buleegasy Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #030303;
            --text-primary: #ffffff;
            --text-secondary: #86868b;
            /* Apple-style muted text */
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.06);
            --primary-glow: #6366f1;
            --secondary-glow: #ec4899;
            --tertiary-glow: #06b6d4;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            letter-spacing: -0.01em;
        }

        /* Grainy Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.035;
        }

        /* Dynamic Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: float 30s infinite ease-in-out alternate;
            z-index: 0;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            top: -300px;
            left: -200px;
            animation-duration: 35s;
        }

        .orb-2 {
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, var(--secondary-glow), transparent 70%);
            bottom: -400px;
            right: -200px;
            animation-duration: 40s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--tertiary-glow), transparent 70%);
            top: 60%;
            left: 55%;
            transform: translate(-50%, -50%);
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }

            33% {
                transform: translate(100px, 150px) scale(1.1) rotate(60deg);
            }

            66% {
                transform: translate(-50px, 80px) scale(0.9) rotate(120deg);
            }

            100% {
                transform: translate(0, 0) scale(1) rotate(180deg);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 5rem;
            animation: fadeInDown 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            margin-bottom: 0.8rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            /* Fixed compatibility */
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        p.subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            width: 100%;
            perspective: 2000px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 4.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            transition:
                transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1),
                background 0.4s ease,
                border-color 0.4s ease,
                box-shadow 0.4s ease;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.25s;
        }

        .card:nth-child(3) {
            animation-delay: 0.4s;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(255, 255, 255, 0.1) 0%,
                    transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        /* Border Glow */
        .card::after {
            content: '';
            position: absolute;
            inset: -1px;
            padding: 1px;
            border-radius: 40px;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(255, 255, 255, 0.3) 0%,
                    transparent 40%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 2;
        }

        .card:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .card:hover::before,
        .card:hover::after {
            opacity: 1;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover .icon-wrapper {
            transform: scale(1.15) rotate(8deg);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card:nth-child(1) .icon-wrapper {
            color: var(--primary-glow);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        .card:nth-child(2) .icon-wrapper {
            color: var(--secondary-glow);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
        }

        .card:nth-child(3) .icon-wrapper {
            color: var(--tertiary-glow);
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
        }

        .icon-wrapper svg {
            width: 44px;
            height: 44px;
            stroke-width: 1.5;
        }

        .card h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            letter-spacing: -0.02em;
            transform: translateZ(20px);
        }

        .card p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 300;
            padding: 0 1rem;
            transform: translateZ(10px);
        }

        .icon-wrapper {
            transform: translateZ(30px);
        }

        /* Particles */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(1px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 3.5rem;
            }

            header {
                margin-bottom: 3.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
                max-width: 450px;
                gap: 1.5rem;
            }

            .card {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div id="particles-container"></div>

    <main class="container">
        <header>
            <h1>Buleegasy Hub</h1>
            <p class="subtitle">Buleecloud Design System</p>
        </header>

        <div class="grid" id="cards">
            <a href="https://fh.buleegasy.space" class="card">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h2>FH</h2>
                <p>Private secure application gateway for high-throughput connections</p>
            </a>

            <a href="https://cpt.buleegasy.space" class="card">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <path d="M21 15l-5-5L5 21" />
                    </svg>
                </div>
                <h2>Periodic Table</h2>
                <p>Deep dive into atomic structures with interactive liquid glass visualization</p>
            </a>

            <a href="https://cloud.buleegasy.space" class="card">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
                    </svg>
                </div>
                <h2>BuleeCloud</h2>
                <p>Next-gen storage powered by Cloudflare R2 and ultimate aesthetics</p>
            </a>
        </div>
    </main>

    <script>
        const cardsContainer = document.getElementById('cards');
        const cards = document.querySelectorAll('.card');

        cardsContainer.addEventListener('mousemove', (e) => {
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);

                // Magnetic effect
                if (card === e.target.closest('.card')) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 15;
                    const rotateY = (centerX - x) / 15;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px) scale(1.02)`;
                } else {
                    card.style.transform = '';
                }
            });
        });

        cardsContainer.addEventListener('mouseleave', () => {
            cards.forEach(card => {
                card.style.transform = '';
            });
        });

        // Particle System
        const particlesContainer = document.getElementById('particles-container');
        const count = 30;

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;

            const duration = Math.random() * 20 + 20;
            const delay = Math.random() * -40;

            p.animate([
                { transform: 'translate(0, 0)', opacity: 0.1 },
                { transform: `translate(${(Math.random() - 0.5) * 200}px, ${(Math.random() - 0.5) * 200}px)`, opacity: 0.3 },
                { transform: 'translate(0, 0)', opacity: 0.1 }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                delay: delay * 1000,
                easing: 'ease-in-out'
            });

            particlesContainer.appendChild(p);
        }
    </script>
</body>

</html>
